<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    {% block head %} {% endblock%}
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/3205/3205117.png" type="image/x-icon">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Fonts: Playfair Display (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      /* ── TOKENS ─────────────────────────────────────────── */
      :root {
        --gold:        #c9a84c;
        --gold-light:  #e8c96e;
        --gold-dim:    rgba(201,168,76,0.18);
        --dark:        #0e0f11;
        --surface:     rgba(16,17,20,0.72);
        --surface-hi:  rgba(255,255,255,0.055);
        --border:      rgba(201,168,76,0.22);
        --text:        #e8e4dc;
        --muted:       rgba(232,228,220,0.55);
        --radius:      14px;
        --nav-h:       62px;
        --font-display: 'Playfair Display', Georgia, serif;
        --font-body:    'DM Sans', system-ui, sans-serif;
        --transition:   0.22s cubic-bezier(0.4,0,0.2,1);
      }

      /* ── RESET / BASE ───────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        font-family: var(--font-body);
        font-size: 15px;
        color: var(--text);
        background-color: var(--dark);
        background-image:
          linear-gradient(to bottom, rgba(10,10,12,0.78) 0%, rgba(10,10,12,0.60) 40%, rgba(10,10,12,0.85) 100%),
          url('/static/photos/FullLogo.jpg');
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* ── NAVBAR ─────────────────────────────────────────── */
      .tph-nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        height: var(--nav-h);
        background: rgba(10,10,12,0.82);
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
      }

      .tph-nav .container-fluid {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 0;
      }

      /* Brand */
      .tph-brand {
        font-family: var(--font-display);
        font-weight: 900;
        font-size: 1.35rem;
        letter-spacing: 0.01em;
        color: var(--gold) !important;
        text-decoration: none;
        white-space: nowrap;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: opacity var(--transition);
      }
      .tph-brand:hover { opacity: 0.8; }
      .tph-brand::before {
        content: '🏇';
        font-size: 1.1rem;
      }

      /* Nav links */
      .tph-nav .navbar-nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.1rem;
        margin-left: auto;
      }

      .tph-nav .nav-link {
        font-family: var(--font-body);
        font-weight: 500;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted) !important;
        padding: 0.4rem 0.75rem !important;
        border-radius: 8px;
        transition: color var(--transition), background var(--transition);
        white-space: nowrap;
      }
      .tph-nav .nav-link:hover {
        color: var(--text) !important;
        background: var(--surface-hi);
      }
      .tph-nav .nav-link.active {
        color: var(--gold) !important;
        background: var(--gold-dim);
      }

      /* Toggler */
      .navbar-toggler {
        border-color: var(--border) !important;
        padding: 0.3rem 0.5rem;
      }
      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28201,168,76,0.85%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
      }

      /* Mobile collapse */
      @media (max-width: 991px) {
        .tph-nav { height: auto; padding: 0.75rem 1.25rem; flex-wrap: wrap; }
        .navbar-collapse {
          background: rgba(10,10,12,0.95);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          margin-top: 0.6rem;
          padding: 0.5rem;
        }
        .tph-nav .navbar-nav {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.15rem;
          margin-left: 0;
        }
        .tph-nav .nav-link { font-size: 0.9rem; width: 100%; }
      }

      /* ── GOLD DIVIDER ───────────────────────────────────── */
      .tph-divider {
        border: none;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
        opacity: 0.35;
        margin: 0;
      }

      /* ── GLASS CARDS ────────────────────────────────────── */
      .glass {
        background: var(--surface);
        backdrop-filter: blur(16px) saturate(140%);
        -webkit-backdrop-filter: blur(16px) saturate(140%);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      /* ── BUTTONS ─────────────────────────────────────────── */
      .btn-gold {
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
        color: #0e0f11;
        font-weight: 600;
        font-size: 0.82rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        border: none;
        border-radius: 10px;
        padding: 0.55rem 1.3rem;
        box-shadow: 0 4px 16px rgba(201,168,76,0.28);
        transition: all var(--transition);
        cursor: pointer;
      }
      .btn-gold:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(201,168,76,0.42);
        color: #0e0f11;
      }
      .btn-gold:active { transform: translateY(0); scale: 0.97; }

      .btn-ghost {
        background: var(--surface-hi);
        color: var(--text);
        font-weight: 500;
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.55rem 1.3rem;
        transition: all var(--transition);
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
      .btn-ghost:hover {
        background: rgba(201,168,76,0.1);
        border-color: var(--gold);
        color: var(--gold);
        transform: translateY(-2px);
      }
      .btn-ghost:active { transform: translateY(0); scale: 0.97; }

      /* ── LINKS ───────────────────────────────────────────── */
      a { transition: all var(--transition); }

      /* ── GLASS PLACEHOLDER (global) ─────────────────────── */
      .glass-placeholder::placeholder {
        color: rgba(232,228,220,0.45);
        animation: placeholderFade 3s ease-in-out infinite;
      }
      @keyframes placeholderFade {
        0%,100% { opacity: 0.35; }
        50%      { opacity: 0.9;  }
      }

      /* ── FLASH MESSAGES ─────────────────────────────────── */
      .tph-flash {
        border: 1px solid rgba(255,99,71,0.5);
        background: rgba(255,99,71,0.18);
        color: var(--text);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        max-width: 380px;
        margin: 1rem 1.25rem;
      }

      /* ── FOOTER PIN ─────────────────────────────────────── */
      .tph-footer-link {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: var(--muted) !important;
        text-decoration: none;
        letter-spacing: 0.05em;
        transition: color var(--transition);
        z-index: 900;
      }
      .tph-footer-link:hover { color: var(--gold) !important; }

      /* ── PAGE FADE IN ────────────────────────────────────── */
      .page-enter {
        animation: pageIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
      }
      @keyframes pageIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      /* ── SCROLLBAR ───────────────────────────────────────── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--dark); }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    </style>

    {% block extra_styles %}{% endblock %}
  </head>

  <body>

    <!-- ── NAV ──────────────────────────────────────────────── -->
    <nav class="tph-nav navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="tph-brand" href="/">The Punters House</a>

        <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse" data-bs-target="#tphNav"
          aria-controls="tphNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="tphNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link {% if homeActive %}active{% endif %}" href="/">Home</a>
            <a class="nav-link {% if tipsActive %}active{% endif %}" href="/tips">Today's Tips</a>
            <a class="nav-link {% if postsActive %}active{% endif %}" href="/wallPost">Member Posts</a>
            <a class="nav-link {% if pastResults %}active{% endif %}" href="/pastresults">Past Results</a>
            {% if user %}
              <a class="nav-link {% if loginActive %}active{% endif %}" href="/logout">Logout</a>
            {% else %}
              <a class="nav-link {% if loginActive %}active{% endif %}" href="/login">Login</a>
            {% endif %}
            <a class="nav-link {% if registerActive %}active{% endif %}" href="/register">Register</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="tph-divider"></div>

    <!-- ── CONTENT ───────────────────────────────────────────── -->
    <main class="page-enter">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
